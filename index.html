<!DOCTYPE html>
<html>

<head>
  <title>Inventory Dashboard</title>

  <style>

    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
    }

    .value {
      font-size: 24px;
      margin-top: 10px;
    }

    .form {
      margin-top: 30px;
    }

    input {
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px;
      font-size: 16px;
      margin-left: 10px;
      cursor: pointer;
    }

  </style>

</head>


<body>

<h1>Inventory Dashboard</h1>


<div class="container">

  <div class="card">
    <h3>Sales</h3>
    <div class="value" id="sales">0</div>
  </div>

  <div class="card">
    <h3>Purchase</h3>
    <div class="value" id="purchase">0</div>
  </div>

  <div class="card">
    <h3>Expense</h3>
    <div class="value" id="expense">0</div>
  </div>

  <div class="card">
    <h3>Profit</h3>
    <div class="value" id="profit">0</div>
  </div>

</div>



<!-- ADD SALE -->

<div class="form">

  <h2>Add Sale</h2>

  <input id="saleInput" type="number" placeholder="Amount">

  <button onclick="addSale()">Add Sale</button>

</div>



<!-- ADD PURCHASE -->

<div class="form">

  <h2>Add Purchase</h2>

  <input id="purchaseInput" type="number" placeholder="Amount">

  <button onclick="addPurchase()">Add Purchase</button>

</div>



<!-- ADD EXPENSE -->

<div class="form">

  <h2>Add Expense</h2>

  <input id="expenseInput" type="number" placeholder="Amount">

  <button onclick="addExpense()">Add Expense</button>

</div>




<script>

const API = "https://inventory-saas-0zns.onrender.com"



function loadDashboard() {

  fetch(API + "/dashboard")
    .then(res => res.json())
    .then(data => {

      document.getElementById("sales").innerText = data.salesTotal
      document.getElementById("purchase").innerText = data.purchaseTotal
      document.getElementById("expense").innerText = data.expenseTotal
      document.getElementById("profit").innerText = data.profit

    })

}



function addSale() {

  const amount = document.getElementById("saleInput").value

  fetch(API + "/add-sale", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({ amount })

  })

  .then(res => res.json())

  .then(() => {

    document.getElementById("saleInput").value = ""

    loadDashboard()

  })

}



function addPurchase() {

  const amount = document.getElementById("purchaseInput").value

  fetch(API + "/add-purchase", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({ amount })

  })

  .then(res => res.json())

  .then(() => {

    document.getElementById("purchaseInput").value = ""

    loadDashboard()

  })

}



function addExpense() {

  const amount = document.getElementById("expenseInput").value

  fetch(API + "/add-expense", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({ amount })

  })

  .then(res => res.json())

  .then(() => {

    document.getElementById("expenseInput").value = ""

    loadDashboard()

  })

}



loadDashboard()

</script>


</body>
</html>
