<!DOCTYPE html>
<html>

<head>

  <title>Inventory Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
    }

    .value {
      font-size: 24px;
    }

    .form {
      margin-top: 20px;
    }

    canvas {
      margin-top: 40px;
      max-width: 600px;
    }

  </style>

</head>


<body>

<h1>Inventory Dashboard</h1>


<div class="container">

  <div class="card">
    Sales
    <div id="sales">0</div>
  </div>

  <div class="card">
    Purchase
    <div id="purchase">0</div>
  </div>

  <div class="card">
    Expense
    <div id="expense">0</div>
  </div>

  <div class="card">
    Profit
    <div id="profit">0</div>
  </div>

</div>



<div class="form">

  <h3>Add Sale</h3>
  <input id="saleInput">
  <button onclick="addSale()">Add</button>

</div>


<div class="form">

  <h3>Add Purchase</h3>
  <input id="purchaseInput">
  <button onclick="addPurchase()">Add</button>

</div>


<div class="form">

  <h3>Add Expense</h3>
  <input id="expenseInput">
  <button onclick="addExpense()">Add</button>

</div>



<h2>Bar Chart</h2>
<canvas id="barChart"></canvas>

<h2>Pie Chart</h2>
<canvas id="pieChart"></canvas>



<script>

const API = "https://inventory-saas-0zns.onrender.com"

let barChart
let pieChart


function loadDashboard() {

  fetch(API + "/dashboard")
    .then(res => res.json())
    .then(data => {

      document.getElementById("sales").innerText = data.salesTotal
      document.getElementById("purchase").innerText = data.purchaseTotal
      document.getElementById("expense").innerText = data.expenseTotal
      document.getElementById("profit").innerText = data.profit

      drawCharts(data)

    })

}


function drawCharts(data) {

  if (barChart) barChart.destroy()
  if (pieChart) pieChart.destroy()


  const labels = ["Sales", "Purchase", "Expense", "Profit"]

  const values = [
    data.salesTotal,
    data.purchaseTotal,
    data.expenseTotal,
    data.profit
  ]


  // BAR

  barChart = new Chart(
    document.getElementById("barChart"),
    {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "Amount",
          data: values
        }]
      }
    }
  )


  // PIE

  pieChart = new Chart(
    document.getElementById("pieChart"),
    {
      type: "pie",
      data: {
        labels: labels,
        datasets: [{
          data: values
        }]
      }
    }
  )

}



function addSale() {

  fetch(API + "/add-sale", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      amount: document.getElementById("saleInput").value
    })
  })
  .then(() => loadDashboard())

}


function addPurchase() {

  fetch(API + "/add-purchase", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      amount: document.getElementById("purchaseInput").value
    })
  })
  .then(() => loadDashboard())

}


function addExpense() {

  fetch(API + "/add-expense", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      amount: document.getElementById("expenseInput").value
    })
  })
  .then(() => loadDashboard())

}


loadDashboard()

</script>

</body>
</html>
