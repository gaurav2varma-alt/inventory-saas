<!DOCTYPE html>
<html>
<head>
  <title>Inventory Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
    }

    .value {
      font-size: 24px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Inventory Dashboard</h1>

<div class="container">
  <div class="card">
    <h3>Sales</h3>
    <div class="value" id="sales">0</div>
  </div>

  <div class="card">
    <h3>Purchase</h3>
    <div class="value" id="purchase">0</div>
  </div>

  <div class="card">
    <h3>Expense</h3>
    <div class="value" id="expense">0</div>
  </div>

  <div class="card">
    <h3>Profit</h3>
    <div class="value" id="profit">0</div>
  </div>
</div>

<script>
  fetch("https://inventory-saas-1.onrender.com/dashboard")
    .then(res => res.json())
    .then(data => {
      document.getElementById("sales").innerText = data.salesTotal;
      document.getElementById("purchase").innerText = data.purchaseTotal;
      document.getElementById("expense").innerText = data.expenseTotal;
      document.getElementById("profit").innerText = data.profit;
    })
    .catch(err => {
      console.error("Error:", err);
    });
</script>

</body>
</html>
